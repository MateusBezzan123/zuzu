version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: product_manager_db
    environment:
      POSTGRES_DB: product_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: product_manager_backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: product_manager
      JWT_SECRET: sua_chave_secreta_super_segura
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: product_manager_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: